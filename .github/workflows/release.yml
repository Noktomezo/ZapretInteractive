name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            args: ''
            xwin: false
          - name: windows
            args: --runner cargo-xwin --target x86_64-pc-windows-msvc
            xwin: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.xwin && 'x86_64-pc-windows-msvc' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev nsis

      - name: Install cargo-xwin & LLVM
        if: matrix.xwin
        run: |
          sudo apt-get install -y clang lld
          pip install cargo-xwin

      - name: Install dependencies
        run: bun install

      - name: Install Just
        uses: taiki-e/install-action@just

      - name: Run linters
        run: just format-front

      - name: Generate icons
        run: just gen-icons

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zapret Interactive ${{ github.ref_name }}'
          releaseBody: GUI-обёртка для zapret-win-bundle от bol-van. Смотри ассеты ниже.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} --verbose

      - name: Create Portable Archive
        shell: bash
        run: |
          if [ "${{ matrix.xwin }}" = "true" ]; then
            cd src-tauri/target/x86_64-pc-windows-msvc/release
            mkdir -p ZapretInteractive/resources
            cp "Zapret Interactive.exe" ZapretInteractive/
            cp -r resources/* ZapretInteractive/resources/
            zip -r ../../../../Zapret-Interactive_Portable_x64.zip ZapretInteractive
            cd ../../../..
            gh release upload ${{ github.ref_name }} Zapret-Interactive_Portable_x64.zip --clobber
          else
            cd src-tauri/target/release
            mkdir -p ZapretInteractive/resources
            cp "Zapret Interactive" ZapretInteractive/
            cp -r resources/* ZapretInteractive/resources/
            tar -czf ../../../Zapret-Interactive_Portable_Linux.tar.gz ZapretInteractive
            cd ../../..
            gh release upload ${{ github.ref_name }} Zapret-Interactive_Portable_Linux.tar.gz --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
