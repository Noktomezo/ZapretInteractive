name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install

      - name: Install Just
        uses: taiki-e/install-action@just

      - name: Run linters
        run: just lint-front

      - name: Generate icons
        run: just gen-icons

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zapret Interactive ${{ github.ref_name }}'
          releaseBody: GUI-обёртка для zapret-win-bundle от bol-van. Смотри ассеты ниже.
          releaseDraft: true
          prerelease: false
          args: --verbose
