name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            args: ''
            target: linux
          - name: windows
            os: windows-latest
            args: ''
            target: windows

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Install Just
        uses: taiki-e/install-action@just

      - name: Run linters
        run: just format-front

      - name: Generate icons
        run: just gen-icons

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zapret Interactive ${{ github.ref_name }}'
          releaseBody: GUI-обёртка для zapret-win-bundle от bol-van. Смотри ассеты ниже.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} --verbose

      - name: Create Portable Archive
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "windows" ]; then
            cd src-tauri/target/release
            mkdir -p ZapretInteractive/resources
            cp "Zapret Interactive.exe" ZapretInteractive/
            cp -r resources/* ZapretInteractive/resources/
            7z a ../../../Zapret-Interactive-Portable-Win-x64.zip ZapretInteractive
            cd ../../..

            cp src-tauri/target/release/bundle/nsis/*.exe Zapret-Interactive-Setup-Win-x64.exe

            gh release upload ${{ github.ref_name }} Zapret-Interactive-Portable-Win-x64.zip --clobber
            gh release upload ${{ github.ref_name }} Zapret-Interactive-Setup-Win-x64.exe --clobber

            ORIG_NAME=$(basename src-tauri/target/release/bundle/nsis/*.exe)
            gh release delete-asset ${{ github.ref_name }} "$ORIG_NAME" -y || true
          else
            cd src-tauri/target/release
            mkdir -p ZapretInteractive/resources
            cp "Zapret Interactive" ZapretInteractive/
            cp -r resources/* ZapretInteractive/resources/
            tar -czf ../../../Zapret-Interactive-Portable-Linux-x64.tar.gz ZapretInteractive
            cd ../../..

            cp src-tauri/target/release/bundle/deb/*.deb Zapret-Interactive-Setup-Linux-x64.deb
            cp src-tauri/target/release/bundle/appimage/*.AppImage Zapret-Interactive-Portable-Linux-x64.AppImage

            gh release upload ${{ github.ref_name }} Zapret-Interactive-Portable-Linux-x64.tar.gz --clobber
            gh release upload ${{ github.ref_name }} Zapret-Interactive-Setup-Linux-x64.deb --clobber
            gh release upload ${{ github.ref_name }} Zapret-Interactive-Portable-Linux-x64.AppImage --clobber

            ORIG_DEB=$(basename src-tauri/target/release/bundle/deb/*.deb)
            ORIG_APPIMAGE=$(basename src-tauri/target/release/bundle/appimage/*.AppImage)
            gh release delete-asset ${{ github.ref_name }} "$ORIG_DEB" -y || true
            gh release delete-asset ${{ github.ref_name }} "$ORIG_APPIMAGE" -y || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
